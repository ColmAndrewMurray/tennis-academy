const [submitting,   setSubmitting]   = useState(false);

const [fieldErrors,  setFieldErrors]  = useState({});

if (hash === '#ta_success') return 'success';
if (hash === '#ta_cancelled') return 'cancel';
return 'form';
});
useEffect(() => {
const hash = window.location.hash;
if (hash === '#ta_success' || hash === '#ta_cancelled') {

}
}, []);

if (SCHEDULE[v] === null) { setAvailability({ tbc:true }); return; }
setLoadingAvail(true);
try {
const res  = await fetch(`${TENNIS_API_URL}/api/availability?venue=${encodeURIComponent(v)}`);

setAvailability(data);
} catch { setAvailability({}); }
finally { setLoadingAvail(false); }

const errs = {}, pErrs = {};

const ce = {};
if (!c.firstName.trim()) ce.firstName = 'Required';
if (!c.lastName.trim())  ce.lastName  = 'Required';
if (!c.dateOfBirth)      ce.dateOfBirth = 'Required';
if (!c.classGroup)       ce.classGroup = 'Required';
if (!c.slotId)           ce.slotId     = 'Please select a time slot';
return ce;
});
if (childErrs.some(ce => Object.keys(ce).length)) errs.children = childErrs;
if (collection.wantsCollection === 'yes' && (!collection.schoolVenue || !collection.time)) {
errs.collectionOption = 'Please select a school and collection time';
}
setFieldErrors(errs);
return Object.keys(errs).length === 0;
}

<span className="ta-step">3</span>
Children

</div>

)}
{!formComplete && venue && !isCurrenagh && (
